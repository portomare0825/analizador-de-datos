<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auditoria de Ingresos, LD' Hoteles.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                '50': '#F5F9F8',
                '100': '#C9D1A5',
                '200': '#8CD9C2',
                '300': '#4BC1A0',
                '400': '#C9D1A5',
                '500': '#E1814C',
                '600': '#E1814C',
                '700': '#D05657',
                '800': '#318067',
                '900': '#066057',
                '950': '#022B27'
              }
            },
            keyframes: {
              'fade-in-up': {
                '0%': {
                  opacity: '0',
                  transform: 'translateY(20px)'
                },
                '100%': {
                  opacity: '1',
                  transform: 'translateY(0)'
                },
              },
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
            },
            animation: {
              'fade-in-up': 'fade-in-up 0.3s ease-out forwards',
              'fade-in': 'fade-in 0.2s ease-out forwards',
            }
          }
        }
      }
    </script>
    <!-- SheetJS (xlsx) for parsing and exporting Excel files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- jsPDF for generating PDF files -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- jsPDF AutoTable plugin for tables in PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@1.29.1",

    "react": "https://aistudiocdn.com/react@19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@19.2.0/",
    "react-dom/client": "https://aistudiocdn.com/react-dom@19.2.0/client",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "path": "https://aistudiocdn.com/path@^0.12.7",
    "fs": "https://aistudiocdn.com/fs@^0.0.1-security",
    "url": "https://aistudiocdn.com/url@^0.11.4"
  }
}
</script>

</head>
  <body class="bg-brand-950 text-brand-50">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
